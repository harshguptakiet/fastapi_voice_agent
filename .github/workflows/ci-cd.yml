name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r fastapi_server/requirements.txt
      - name: Lint
        run: |
          pip install flake8
          flake8 fastapi_server/app
      - name: Test
        run: |
          pip install pytest
          pytest fastapi_server/tests
      - name: Build Docker image
        run: |
          docker build -t fastapi-server:ci fastapi_server/
